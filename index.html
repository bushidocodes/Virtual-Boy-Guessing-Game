<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Vector Guess</title>
	<link rel="stylesheet" href="./css/normalize.css">
	<link rel="stylesheet" href="./css/style.css">
</head>
<body>
	<header>
		<h1 id="title">Vector Guess</h1>
		<h2 id="subtitle">Guess a number between 1-100!</h2>
	</header>
	<main>
		<section id="input-section">
			<input id="players-input" type="text" inputmode="numeric" autofocus placeholder="?" maxlength="3">
			<button id="submit">Go!</button>
		</section>
		<section id="guess-section">
			<ul id="guess-list">
				<li class="guess">-</li>
				<li class="guess">-</li>
				<li class="guess">-</li>
				<li class="guess">-</li>
				<li class="guess">-</li>
			</ul>
		</section>
		<section id="menu-section">
			<button id="reset">Reset</button>
			<button id="hint">Hint</button>
		</section>
	</main>
	<footer>
		<img id="footer-logo" src="./img/fa-logo.svg" alt="Fullstack Academy logo">
		<h4 id="footer-name">Sean McBride</h4>
	</footer>
	<script type="module" src="./js/controller.ts"></script>
</body>
</html>
